{% extends "base.html" %}

{% block content %}
<div class="fixed inset-0 bg-cyber-dark z-[100] flex items-center justify-center fade-in">
    <!-- Background elements -->
    <div
        class="absolute top-0 right-0 w-[800px] h-[600px] bg-cyber-blue/10 blur-[120px] rounded-full pointer-events-none -translate-y-1/2 translate-x-1/3">
    </div>
    <div
        class="absolute bottom-0 left-0 w-[600px] h-[500px] bg-cyber-cyan/10 blur-[100px] rounded-full pointer-events-none translate-y-1/3 -translate-x-1/4">
    </div>

    <div
        class="glass-container w-full max-w-md relative z-10 p-10 transform scale-100 transition-transform duration-500 hover:scale-[1.01]">

        <div class="flex flex-col items-center mb-10">
            <div
                class="w-16 h-16 bg-gradient-to-br from-cyber-cyan to-cyber-blue rounded-2xl flex items-center justify-center shadow-neon-cyan mb-5 relative group">
                <div
                    class="absolute inset-0 bg-white/20 blur-sm group-hover:bg-white/40 transition-colors duration-500 rounded-2xl">
                </div>
                <i class="ph-bold ph-heartbeat text-white text-3xl relative z-10"></i>
            </div>
            <h1 class="text-3xl font-extrabold tracking-tight text-white mb-2">NEO<span
                    class="text-cyber-cyan">GUARD</span></h1>
            <p class="text-sm font-medium text-slate-400 tracking-widest uppercase">Clinical Access Terminal</p>
        </div>

        {% if error %}
        <div class="mb-6 p-4 rounded-xl bg-cyber-red/10 border border-cyber-red/30 flex items-start gap-3 fade-in">
            <i class="ph-fill ph-warning-circle text-cyber-red text-xl mt-0.5"></i>
            <p class="text-sm font-medium text-red-200">{{ error }}</p>
        </div>
        {% endif %}

        {% if success %}
        <div class="mb-6 p-4 rounded-xl bg-cyber-green/10 border border-cyber-green/30 flex items-start gap-3 fade-in">
            <i class="ph-fill ph-check-circle text-cyber-green text-xl mt-0.5"></i>
            <p class="text-sm font-medium text-green-200">{{ success }}</p>
        </div>
        {% endif %}

        <form action="/login" method="POST" class="flex flex-col gap-6" id="loginForm">
            <div>
                <label for="email" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Hospital
                    ID / Email</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i
                            class="ph-fill ph-envelope text-slate-500 group-focus-within:text-cyber-cyan transition-colors"></i>
                    </div>
                    <input type="email" name="email" id="email" required
                        class="w-full bg-cyber-surface border border-slate-700/50 rounded-xl py-3 pl-11 pr-4 text-slate-200 focus:outline-none focus:border-cyber-cyan focus:ring-1 focus:ring-cyber-cyan/50 transition-all placeholder:text-slate-600"
                        placeholder="staff@neoguard.hospital">
                </div>
            </div>

            <div>
                <div class="flex justify-between items-end mb-2">
                    <label for="password"
                        class="block text-xs font-bold text-slate-400 uppercase tracking-wider">Passcode</label>
                    <a href="#"
                        class="text-[0.65rem] font-bold text-cyber-cyan hover:text-white transition-colors">Forgot
                        Passcode?</a>
                </div>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i
                            class="ph-fill ph-lock-key text-slate-500 group-focus-within:text-cyber-cyan transition-colors"></i>
                    </div>
                    <input type="password" name="password" id="password" required
                        class="w-full bg-cyber-surface border border-slate-700/50 rounded-xl py-3 pl-11 pr-12 text-slate-200 focus:outline-none focus:border-cyber-cyan focus:ring-1 focus:ring-cyber-cyan/50 transition-all placeholder:text-slate-600"
                        placeholder="••••••••">
                    <button type="button" id="togglePassword"
                        class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-500 hover:text-cyber-cyan transition-colors">
                        <i class="ph-bold ph-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="loginBtn"
                class="w-full mt-4 bg-gradient-to-r from-cyber-cyan to-cyber-blue text-white font-bold py-3.5 rounded-xl shadow-[0_0_20px_rgba(6,182,212,0.3)] hover:shadow-[0_0_30px_rgba(6,182,212,0.5)] transition-all flex items-center justify-center gap-2 group">
                <span id="btnText">Authenticate Request</span>
                <i class="ph-bold ph-arrow-right group-hover:translate-x-1 transition-transform" id="btnIcon"></i>
                <i class="ph-bold ph-spinner-gap animate-spin hidden" id="loadingSpinner"></i>
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="/register" class="text-sm font-medium text-slate-400 hover:text-white transition-colors">
                Don't have an account? <span class="text-cyber-cyan font-bold">Create Account</span>
            </a>
        </div>

        <div class="mt-8 text-center border-t border-slate-700/50 pt-6">
            <p
                class="text-[0.65rem] font-medium text-slate-500 tracking-widest uppercase flex items-center justify-center gap-2">
                <i class="ph-fill ph-shield-check text-cyber-green text-sm"></i>
                BioSecure™ End-to-End Encryption
            </p>
        </div>
    </div>
</div>

<script>
    // Password visibility toggle
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');
    const eyeIcon = document.getElementById('eyeIcon');

    if (togglePassword) {
        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.classList.toggle('ph-eye');
            eyeIcon.classList.toggle('ph-eye-closed');
        });
    }

    // Loading animation on submit
    const loginForm = document.getElementById('loginForm');
    if (loginForm) {
        loginForm.addEventListener('submit', () => {
            const btn = document.getElementById('loginBtn');
            const txt = document.getElementById('btnText');
            const icon = document.getElementById('btnIcon');
            const spinner = document.getElementById('loadingSpinner');

            btn.classList.add('opacity-80', 'cursor-not-allowed');
            txt.innerText = 'Verifying Credentials...';
            icon.classList.add('hidden');
            spinner.classList.remove('hidden');
        });
    }

    // Hide global elements that shouldn't appear on login page
    document.addEventListener("DOMContentLoaded", function () {
        const sidebar = document.querySelector('aside');
        const header = document.querySelector('header');
        const voiceBtn = document.getElementById('globalVoiceContainer');
        const main = document.querySelector('main');

        if (sidebar) sidebar.style.display = 'none';
        if (header) header.style.display = 'none';
        if (voiceBtn) voiceBtn.style.display = 'none';
        if (main) {
            main.classList.remove('ml-72', 'p-8');
            main.classList.add('p-0');
        }
    });
</script>
{% endblock %}
