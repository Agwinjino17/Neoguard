{% extends "base.html" %}

{% block content %}
<div
    class="fixed inset-0 bg-cyber-dark z-[100] flex items-center justify-center fade-in overflow-y-auto w-full h-full py-10">
    <!-- Background elements -->
    <div
        class="fixed top-0 right-0 w-[800px] h-[600px] bg-cyber-blue/10 blur-[120px] rounded-full pointer-events-none -translate-y-1/2 translate-x-1/3">
    </div>
    <div
        class="fixed bottom-0 left-0 w-[600px] h-[500px] bg-cyber-cyan/10 blur-[100px] rounded-full pointer-events-none translate-y-1/3 -translate-x-1/4">
    </div>

    <div
        class="glass-container w-full max-w-lg relative z-10 p-10 transform scale-100 transition-transform duration-500 hover:scale-[1.01] my-auto">

        <div class="flex flex-col items-center mb-8">
            <div
                class="w-14 h-14 bg-gradient-to-br from-cyber-cyan to-cyber-blue rounded-2xl flex items-center justify-center shadow-neon-cyan mb-4 relative group">
                <div
                    class="absolute inset-0 bg-white/20 blur-sm group-hover:bg-white/40 transition-colors duration-500 rounded-2xl">
                </div>
                <i class="ph-bold ph-user-plus text-white text-2xl relative z-10"></i>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tight text-white mb-1">CLINICAL <span
                    class="text-cyber-cyan">REGISTRATION</span></h1>
            <p class="text-xs font-medium text-slate-400 tracking-widest uppercase">Secure Staff Onboarding</p>
        </div>

        {% if error %}
        <div class="mb-6 p-4 rounded-xl bg-cyber-red/10 border border-cyber-red/30 flex items-start gap-3 fade-in">
            <i class="ph-fill ph-warning-circle text-cyber-red text-xl mt-0.5"></i>
            <p class="text-sm font-medium text-red-200">{{ error }}</p>
        </div>
        {% endif %}

        <form action="/register" method="POST" class="flex flex-col gap-5" id="registerForm">
            <div>
                <label for="name" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Full
                    Name</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i
                            class="ph-fill ph-identification-badge text-slate-500 group-focus-within:text-cyber-cyan transition-colors"></i>
                    </div>
                    <input type="text" name="name" id="name" required
                        class="w-full bg-cyber-surface border border-slate-700/50 rounded-xl py-2.5 pl-11 pr-4 text-slate-200 focus:outline-none focus:border-cyber-cyan focus:ring-1 focus:ring-cyber-cyan/50 transition-all placeholder:text-slate-600"
                        placeholder="Dr. Sarah Jenkins">
                </div>
            </div>

            <div>
                <label for="email" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Hospital
                    Email</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i
                            class="ph-fill ph-envelope text-slate-500 group-focus-within:text-cyber-cyan transition-colors"></i>
                    </div>
                    <input type="email" name="email" id="email" required
                        class="w-full bg-cyber-surface border border-slate-700/50 rounded-xl py-2.5 pl-11 pr-4 text-slate-200 focus:outline-none focus:border-cyber-cyan focus:ring-1 focus:ring-cyber-cyan/50 transition-all placeholder:text-slate-600"
                        placeholder="s.jenkins@neoguard.hospital">
                </div>
            </div>

            <div>
                <label for="role" class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Clinical
                    Role</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <i
                            class="ph-fill ph-stethoscope text-slate-500 group-focus-within:text-cyber-cyan transition-colors"></i>
                    </div>
                    <select name="role" id="role" required
                        class="w-full bg-cyber-surface border border-slate-700/50 rounded-xl py-2.5 pl-11 pr-4 text-slate-200 focus:outline-none focus:border-cyber-cyan focus:ring-1 focus:ring-cyber-cyan/50 transition-all appearance-none cursor-pointer">
                        <option value="doctor">Attending Physician / Doctor</option>
                        <option value="nurse">Registered Nurse / ICU Staff</option>
                        <option value="admin">System Administrator</option>
                        <option value="staff" selected>General Staff</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="password"
                        class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Passcode</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i
                                class="ph-fill ph-lock-key text-slate-500 group-focus-within:text-cyber-cyan transition-colors"></i>
                        </div>
                        <input type="password" name="password" id="password" required minlength="8"
                            class="w-full bg-cyber-surface border border-slate-700/50 rounded-xl py-2.5 pl-11 pr-12 text-slate-200 focus:outline-none focus:border-cyber-cyan focus:ring-1 focus:ring-cyber-cyan/50 transition-all placeholder:text-slate-600"
                            placeholder="Min 8 chars">
                        <button type="button" id="togglePassword"
                            class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-500 hover:text-cyber-cyan transition-colors">
                            <i class="ph-bold ph-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <div>
                    <label for="confirm_password"
                        class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Confirm</label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <i
                                class="ph-fill ph-check-square-offset text-slate-500 group-focus-within:text-cyber-cyan transition-colors"></i>
                        </div>
                        <input type="password" name="confirm_password" id="confirm_password" required minlength="8"
                            class="w-full bg-cyber-surface border border-slate-700/50 rounded-xl py-2.5 pl-11 pr-12 text-slate-200 focus:outline-none focus:border-cyber-cyan focus:ring-1 focus:ring-cyber-cyan/50 transition-all placeholder:text-slate-600"
                            placeholder="Repeat Passcode">
                        <button type="button" id="toggleConfirmPassword"
                            class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-500 hover:text-cyber-cyan transition-colors">
                            <i class="ph-bold ph-eye" id="confirmEyeIcon"></i>
                        </button>
                    </div>
                </div>
            </div>

            <button type="submit" id="registerBtn"
                class="w-full mt-2 bg-gradient-to-r from-cyber-cyan to-cyber-blue text-white font-bold py-3.5 rounded-xl shadow-[0_0_20px_rgba(6,182,212,0.3)] hover:shadow-[0_0_30px_rgba(6,182,212,0.5)] transition-all flex items-center justify-center gap-2 group">
                <span id="btnText">Establish Access</span>
                <i class="ph-bold ph-user-plus group-hover:scale-110 transition-transform" id="btnIcon"></i>
                <i class="ph-bold ph-spinner-gap animate-spin hidden" id="loadingSpinner"></i>
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="/login" class="text-sm font-medium text-slate-400 hover:text-white transition-colors">
                Already have credentials? <span class="text-cyber-cyan font-bold">Authenticate</span>
            </a>
        </div>

        <div class="mt-8 text-center border-t border-slate-700/50 pt-5">
            <p
                class="text-[0.65rem] font-medium text-slate-500 tracking-widest uppercase flex items-center justify-center gap-2">
                <i class="ph-fill ph-shield-check text-cyber-green text-sm"></i>
                BioSecure™ End-to-End Encryption
            </p>
        </div>
    </div>
</div>

<script>
    const registerForm = document.getElementById('registerForm');
    const pwd = document.getElementById('password');
    const confirmPwd = document.getElementById('confirm_password');

    // Password visibility toggles
    function setupVisibilityToggle(toggleBtnId, inputElement, iconElementId) {
        const toggleBtn = document.getElementById(toggleBtnId);
        const icon = document.getElementById(iconElementId);
        if (toggleBtn && inputElement && icon) {
            toggleBtn.addEventListener('click', () => {
                const type = inputElement.getAttribute('type') === 'password' ? 'text' : 'password';
                inputElement.setAttribute('type', type);
                icon.classList.toggle('ph-eye');
                icon.classList.toggle('ph-eye-closed');
            });
        }
    }

    setupVisibilityToggle('togglePassword', pwd, 'eyeIcon');
    setupVisibilityToggle('toggleConfirmPassword', confirmPwd, 'confirmEyeIcon');

    if (registerForm) {
        registerForm.addEventListener('submit', (e) => {
            if (pwd.value !== confirmPwd.value) {
                e.preventDefault();
                alert("Passcodes do not match. Please verify.");
                return;
            }

            const btn = document.getElementById('registerBtn');
            const txt = document.getElementById('btnText');
            const icon = document.getElementById('btnIcon');
            const spinner = document.getElementById('loadingSpinner');

            btn.classList.add('opacity-80', 'cursor-not-allowed');
            txt.innerText = 'Encrypting Credentials...';
            icon.classList.add('hidden');
            spinner.classList.remove('hidden');
        });
    }

    // Hide global elements that shouldn't appear on registration page
    document.addEventListener("DOMContentLoaded", function () {
        const sidebar = document.querySelector('aside');
        const header = document.querySelector('header');
        const voiceBtn = document.getElementById('globalVoiceContainer');
        const main = document.querySelector('main');

        if (sidebar) sidebar.style.display = 'none';
        if (header) header.style.display = 'none';
        if (voiceBtn) voiceBtn.style.display = 'none';
        if (main) {
            main.classList.remove('ml-72', 'p-8');
            main.classList.add('p-0');
        }
    });
</script>
{% endblock %}
